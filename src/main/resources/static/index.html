<!DOCTYPE html>
<html>
<head>
    <title>LMS Portal</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px;
            margin: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        h1 {
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>LMS Portal</h1>

    <!-- GET COURSES -->
    <h3>View Courses</h3>
    <button onclick="getCourses()">Get Courses</button>
    <p id="courses"></p>

    <!-- ADD COURSE -->
    <h3>Add Course</h3>
    <input type="text" id="course" placeholder="Enter course name">
    <br>
    <button onclick="addCourse()">Add Course</button>
    <p id="result"></p>

</div>

<script>
function getCourses() {
    fetch('/lms/courses')
    .then(response => response.json())
    .then(data => {
        document.getElementById("courses").innerText = data.join(", ");
    });
}

function addCourse() {
    let course = document.getElementById("course").value;

    fetch('/lms/addCourse?course=' + course, {
        method: 'POST'
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById("result").innerText = data;
    });
}
</script>

</body>
</html>
